# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: ainich
service: c-code-review

provider:
  name: aws
  runtime: python3.11
  region: ap-southeast-1
  environment:
    STAGE: prod
    UPSTASH_REDIS_REST_URL: ${env:UPSTASH_REDIS_REST_URL}
    UPSTASH_REDIS_REST_TOKEN: ${env:UPSTASH_REDIS_REST_TOKEN}
    GITHUB_TOKEN: ${env:GITHUB_TOKEN, ''}
    GITHUB_APP_ID: ${env:GITHUB_APP_ID, ''}
    GITHUB_PRIVATE_KEY: ${env:GITHUB_PRIVATE_KEY, ''}
    GITHUB_WEBHOOK_SECRET: ${env:GITHUB_WEBHOOK_SECRET, ''}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}
    # Must match the full deployed function name: {service}-{stage}-{function_key}
    WORKER_FUNCTION_NAME: c-code-review-dev-worker
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:c-code-review-dev-worker"

plugins:
  - serverless-dotenv-plugin

functions:
  api:
    handler: main.handler
    timeout: 29
    memorySize: 512
    events:
      - httpApi: '*'

  worker:
    handler: worker.lambda_handler
    timeout: 900
    memorySize: 512
    # No httpApi event — invoked directly by the api function via boto3

custom:
  pythonRequirements:
    dockerizePip: true
    useStaticCache: false
    invalidateCache: true
    slim: true
    noDeploy:
      - boto3
      - botocore
      - awscli
      - uvicorn

package:
  exclude:
    - tests/**
    - docs/**
    - .git/**
    - __pycache__/**
    - "**/__pycache/**"
    - "*.pyc"
    - "*.pyo"
    - "*.pyd"
    - .vscode/**
    - local_config/**
    - .venv/**
    - .env
    - Procfile
    - layer/